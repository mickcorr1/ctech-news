<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cTech News</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#030805;--surf:#080f0a;--surf2:#0d1a10;--bdr:rgba(0,255,80,0.08);--bdr2:rgba(0,255,80,0.18);--green:#00ff50;--blue:#00aaff;--gold:#f5c842;--red:#ff4444;--text:#d4f0dc;--muted:#4a7a56;--dim:#1e3a24;--brand:'Orbitron',sans-serif;--body:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.site-header{position:sticky;top:0;z-index:100;background:rgba(3,8,5,0.97);border-bottom:1px solid var(--bdr2);padding:0 20px;display:flex;align-items:center;gap:16px;height:58px;box-shadow:0 1px 20px rgba(0,255,80,0.05)}
.logo-svg{height:40px;width:auto}
.header-time{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap;margin-left:auto}
.nav-bar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 20px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.nav-bar::-webkit-scrollbar{display:none}
.nav-tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:var(--body);font-size:12px;font-weight:500;padding:12px 14px 10px;cursor:pointer;white-space:nowrap;transition:all 0.2s}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--green);border-bottom-color:var(--green)}
.main-wrap{display:flex;min-height:calc(100vh - 102px)}
.sidebar{width:260px;min-width:260px;border-right:1px solid var(--bdr);padding:16px;display:flex;flex-direction:column;gap:18px}
.content-area{flex:1;padding:20px;min-width:0}
.panel-title{font-family:var(--brand);font-size:10px;letter-spacing:2px;color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:7px;text-shadow:0 0 10px rgba(0,255,80,0.5)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.comm-row{background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;padding:7px 11px;display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.comm-name{font-size:11px;color:var(--muted)}
.comm-val{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--green)}
.comm-val.s{color:#9ecfb0}.comm-val.o{color:#fb923c}.comm-val.c{color:#cd9b6a}.comm-val.a{color:var(--blue)}.comm-val.b{color:#f7931a}
.comm-chg{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px}
.up{background:rgba(0,255,80,0.1);color:var(--green)}.dn{background:rgba(255,68,68,0.1);color:var(--red)}
.housing-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.h-box{background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;padding:7px 9px}
.h-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px}
.h-val{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--text);margin-top:1px}
.h-chg{font-size:10px;color:var(--green)}
.section-head{font-family:var(--brand);font-size:13px;letter-spacing:2px;color:var(--green);margin-bottom:14px;text-shadow:0 0 12px rgba(0,255,80,0.4)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:11px;margin-bottom:28px}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:8px;padding:13px;display:flex;flex-direction:column;gap:6px;transition:border-color 0.2s}
.card:hover{border-color:var(--bdr2)}
.card a{text-decoration:none;color:inherit}
.card-top{display:flex;align-items:center;justify-content:space-between}
.pill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:0.7px}
.p-av{background:rgba(0,170,255,0.12);color:#00aaff;border:1px solid rgba(0,170,255,0.2)}
.p-fi{background:rgba(245,200,66,0.12);color:var(--gold);border:1px solid rgba(245,200,66,0.2)}
.p-pr{background:rgba(168,85,247,0.12);color:#c084fc;border:1px solid rgba(168,85,247,0.2)}
.p-sm{background:rgba(0,255,80,0.1);color:var(--green);border:1px solid var(--bdr2)}
.p-sb{background:rgba(251,146,60,0.12);color:#fb923c;border:1px solid rgba(251,146,60,0.2)}
.p-hs{background:rgba(244,114,182,0.12);color:#f472b6;border:1px solid rgba(244,114,182,0.2)}
.p-nu{background:rgba(74,222,128,0.12);color:#4ade80;border:1px solid rgba(74,222,128,0.2)}
.p-jo{background:rgba(99,102,241,0.12);color:#818cf8;border:1px solid rgba(99,102,241,0.2)}
.p-po{background:rgba(255,68,68,0.1);color:#ff8080;border:1px solid rgba(255,68,68,0.2)}
.card-time{font-family:var(--mono);font-size:10px;color:var(--muted)}
.card-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.4}
.card-title a{color:var(--text)}
.card-title a:hover{color:var(--green)}
.card-desc{font-size:11px;color:var(--muted);line-height:1.55}
.card-src{font-size:10px;color:var(--dim);border-top:1px solid var(--bdr);padding-top:6px;margin-top:2px}
.loading-msg{color:var(--muted);font-size:13px;padding:2rem;text-align:center}
.footer{text-align:center;padding:16px;font-size:11px;color:var(--muted);border-top:1px solid var(--bdr)}
.brand{font-family:var(--brand);font-size:11px;color:var(--green);letter-spacing:2px}
@media(max-width:700px){.sidebar{display:none}.cards-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="site-header">
  <svg class="logo-svg" viewBox="0 0 220 54" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="gg"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="gb"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#0066cc"/><stop offset="60%" stop-color="#00aaff"/><stop offset="100%" stop-color="#00ff50"/></linearGradient>
      <linearGradient id="tg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#44ff88"/><stop offset="100%" stop-color="#00aa30"/></linearGradient>
    </defs>
    <ellipse cx="105" cy="30" rx="80" ry="22" stroke="url(#ag)" stroke-width="1.8" fill="none" filter="url(#gb)" opacity="0.7"/>
    <g filter="url(#gg)" transform="translate(162,10) rotate(-30)">
      <path d="M0,8 L22,0 L20,4 L28,4 L18,8 L28,12 L20,12 L22,16 Z" fill="none" stroke="#00ff50" stroke-width="1.4" stroke-linejoin="round"/>
      <path d="M14,8 L0,12 L4,8 L0,4 Z" fill="none" stroke="#00ff50" stroke-width="1.2"/>
    </g>
    <path d="M148,12 L154,9 L152,14" fill="none" stroke="#00ff50" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#gg)"/>
    <text x="10" y="42" font-family="Orbitron,sans-serif" font-size="28" font-weight="900" fill="url(#tg)" filter="url(#gg)" opacity="0.9">c</text>
    <text x="14" y="50" font-family="DM Sans,sans-serif" font-size="7" fill="#00aa30" opacity="0.65">orr</text>
    <text x="36" y="42" font-family="Orbitron,sans-serif" font-size="26" font-weight="900" fill="url(#tg)" filter="url(#gg)">Tech</text>
    <path d="M10,47 Q80,56 155,44" stroke="url(#ag)" stroke-width="1.5" fill="none" opacity="0.6" filter="url(#gb)"/>
  </svg>
  <div class="header-time" id="clock"></div>
</header>

<nav class="nav-bar">
  <button class="nav-tab active" onclick="showTab('all',this)">📰 All News</button>
  <button class="nav-tab" onclick="showTab('aviation',this)">✈️ Aviation</button>
  <button class="nav-tab" onclick="showTab('finance',this)">💰 Finance & Tax</button>
  <button class="nav-tab" onclick="showTab('property',this)">🏠 SEQ Property</button>
  <button class="nav-tab" onclick="showTab('smsf',this)">🏦 SMSF</button>
  <button class="nav-tab" onclick="showTab('smallbiz',this)">🛠️ Small Business</button>
  <button class="nav-tab" onclick="showTab('homeschool',this)">📚 Home School</button>
  <button class="nav-tab" onclick="showTab('nutrition',this)">🥗 Food & Nutrition</button>
  <button class="nav-tab" onclick="showTab('jobs',this)">👨‍✈️ Pilot Jobs</button>
  <button class="nav-tab" onclick="showTab('politics',this)">🏛️ Political Watch</button>
</nav>

<div class="main-wrap">
  <aside class="sidebar">
    <div>
      <div class="panel-title"><div class="dot"></div>LIVE MARKETS</div>
      <div id="markets-panel"><div class="loading-msg" style="padding:0.5rem;font-size:11px">Loading…</div></div>
    </div>
    <div>
      <div class="panel-title"><div class="dot" style="background:#c084fc;box-shadow:0 0 6px #c084fc"></div>SEQ HOUSING</div>
      <div class="housing-grid">
        <div class="h-box"><div class="h-label">Brisbane</div><div class="h-val">$920k</div><div class="h-chg">▲ 8.2% YoY</div></div>
        <div class="h-box"><div class="h-label">Gold Coast</div><div class="h-val">$1.08m</div><div class="h-chg">▲ 11.4% YoY</div></div>
        <div class="h-box"><div class="h-label">Sunshine Cst</div><div class="h-val">$1.02m</div><div class="h-chg">▲ 9.6% YoY</div></div>
        <div class="h-box"><div class="h-label">Rental Yield</div><div class="h-val">4.1%</div><div class="h-chg" style="color:var(--muted)">Gross avg</div></div>
      </div>
      <div style="font-size:9px;color:var(--dim);text-align:right">CoreLogic estimate</div>
    </div>
  </aside>

  <main class="content-area" id="content">
    <div class="loading-msg">Loading news feeds…</div>
  </main>
</div>

<footer class="footer"><span class="brand">cTech</span> · Corr Family News Hub · Brisbane QLD · <span id="last-updated"></span></footer>

<script>
// Clock
function tick(){document.getElementById('clock').textContent=new Date().toLocaleString('en-AU',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',timeZone:'Australia/Brisbane'})+' AEST';}
tick();setInterval(tick,30000);

// RSS proxy — use allorigins to bypass CORS
async function fetchRSS(url){
  const proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
  const r=await fetch(proxy);
  const d=await r.json();
  return d.contents;
}

function parseRSS(xml,category,pill,sourceLabel){
  const parser=new DOMParser();
  const doc=parser.parseFromString(xml,'text/xml');
  const items=[...doc.querySelectorAll('item')].slice(0,4);
  return items.map(item=>{
    const title=item.querySelector('title')?.textContent||'';
    const desc=(item.querySelector('description')?.textContent||'').replace(/<[^>]+>/g,'').trim().substring(0,160);
    const link=item.querySelector('link')?.textContent||'#';
    const pubDate=item.querySelector('pubDate')?.textContent||'';
    const date=pubDate?new Date(pubDate).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}):'';
    return {title,desc,link,date,category,pill,source:sourceLabel};
  });
}

// Feed sources
const FEEDS=[
  {url:'https://www.casa.gov.au/rss.xml', category:'aviation', pill:'p-av', label:'CASA', name:'Aviation'},
  {url:'https://www.ato.gov.au/newsrooms/individuals-newsroom/rss', category:'finance', pill:'p-fi', label:'ATO', name:'Finance & Tax'},
  {url:'https://www.ato.gov.au/newsrooms/small-business-newsroom/rss', category:'smallbiz', pill:'p-sb', label:'ATO Small Biz', name:'Small Business'},
  {url:'https://www.ato.gov.au/newsrooms/superannuation-funds-newsroom/rss', category:'smsf', pill:'p-sm', label:'ATO Super', name:'SMSF'},
  {url:'https://www.realestate.com.au/news/feed/', category:'property', pill:'p-pr', label:'realestate.com.au', name:'SEQ Property'},
  {url:'https://www.abc.net.au/news/feed/51120/rss.xml', category:'politics', pill:'p-po', label:'ABC News', name:'Political Watch'},
  {url:'https://www.abc.net.au/news/feed/2888042/rss.xml', category:'nutrition', pill:'p-nu', label:'ABC Health', name:'Food & Nutrition'},
  {url:'https://www.educationhq.com/rss/', category:'homeschool', pill:'p-hs', label:'EducationHQ', name:'Home School'},
  {url:'https://www.aviationjobsearch.com/rss/recent', category:'jobs', pill:'p-jo', label:'Aviation Job Search', name:'Pilot Jobs'},
];

let allCards=[];
let activeTab='all';

function showTab(name,btn){
  activeTab=name;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function renderCards(){
  const filtered=activeTab==='all'?allCards:allCards.filter(c=>c.category===activeTab);
  const content=document.getElementById('content');
  if(!filtered.length){content.innerHTML='<div class="loading-msg">No stories for this category yet.</div>';return;}

  // Group by category for All view
  if(activeTab==='all'){
    const groups={};
    filtered.forEach(c=>{if(!groups[c.category])groups[c.category]=[];groups[c.category].push(c);});
    let html='';
    FEEDS.forEach(f=>{
      const items=groups[f.category];
      if(!items||!items.length)return;
      html+=`<div class="section-head">${getCatIcon(f.category)} ${f.name}</div><div class="cards-grid">${items.map(cardHTML).join('')}</div>`;
    });
    content.innerHTML=html||'<div class="loading-msg">Loading…</div>';
  } else {
    const feed=FEEDS.find(f=>f.category===activeTab);
    const name=feed?feed.name:activeTab;
    content.innerHTML=`<div class="section-head">${getCatIcon(activeTab)} ${name}</div><div class="cards-grid">${filtered.map(cardHTML).join('')}</div>`;
  }
  document.getElementById('last-updated').textContent='Updated '+new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',timeZone:'Australia/Brisbane'});
}

function cardHTML(c){
  return `<div class="card">
    <div class="card-top"><span class="pill ${c.pill}">${c.source}</span><span class="card-time">${c.date}</span></div>
    <div class="card-title"><a href="${c.link}" target="_blank">${c.title}</a></div>
    ${c.desc?`<div class="card-desc">${c.desc}</div>`:''}
    <div class="card-src">📰 ${c.source}</div>
  </div>`;
}

function getCatIcon(cat){
  const icons={aviation:'✈️',finance:'💰',property:'🏠',smsf:'🏦',smallbiz:'🛠️',homeschool:'📚',nutrition:'🥗',jobs:'👨‍✈️',politics:'🏛️'};
  return icons[cat]||'📰';
}

// Load all feeds
async function loadFeeds(){
  document.getElementById('content').innerHTML='<div class="loading-msg">Loading news feeds…</div>';
  for(const feed of FEEDS){
    try{
      const xml=await fetchRSS(feed.url);
      const cards=parseRSS(xml,feed.category,feed.pill,feed.label);
      allCards=[...allCards,...cards];
      renderCards();
    }catch(e){console.log('Feed failed:',feed.label,e);}
  }
}

// Markets
const MARKETS=[
  {sym:'XAUUSD=X',label:'Gold (oz)',cls:''},
  {sym:'XAGUSD=X',label:'Silver (oz)',cls:'s'},
  {sym:'CL=F',label:'WTI Crude',cls:'o'},
  {sym:'AUDUSD=X',label:'AUD/USD',cls:'a'},
  {sym:'BTC-USD',label:'Bitcoin',cls:'b'},
  {sym:'^AXJO',label:'ASX 200',cls:'a'},
];
async function loadMarkets(){
  let html='';
  for(const m of MARKETS){
    try{
      const r=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(m.sym)}?interval=1d&range=2d`);
      const d=await r.json();
      const meta=d.chart.result[0].meta;
      const price=meta.regularMarketPrice;
      const prev=meta.previousClose||meta.chartPreviousClose;
      const pct=prev?((price-prev)/prev*100):0;
      const up=pct>=0;
      const fmt=m.sym.includes('USD=X')&&!m.sym.includes('XA')?price.toFixed(4):m.sym.includes('BTC')?'$'+Math.round(price).toLocaleString():m.sym.includes('XA')?'$'+price.toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2}):'$'+price.toFixed(2);
      html+=`<div class="comm-row"><div><div class="comm-name">${m.label}</div><div class="comm-val ${m.cls}">${fmt}</div></div><div class="comm-chg ${up?'up':'dn'}">${up?'▲':'▼'}${Math.abs(pct).toFixed(2)}%</div></div>`;
    }catch(e){html+=`<div class="comm-row"><div><div class="comm-name">${m.label}</div><div class="comm-val">—</div></div><div class="comm-chg">—</div></div>`;}
    await new Promise(r=>setTimeout(r,120));
  }
  document.getElementById('markets-panel').innerHTML=html;
}

loadFeeds();
loadMarkets();
</script>
</body>
</html>
